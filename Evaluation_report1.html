<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рабочий лист: Инженерные отчеты</title>
    <!-- Подключаем стили и библиотеки -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Подключаем Firebase (база данных) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Конфигурация Firebase
        const firebaseConfig = JSON.parse(window.__firebase_config || '{}');
        const appId = typeof window.__app_id !== 'undefined' ? window.__app_id : 'default-app-id';

        // Инициализация
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();
        const auth = firebase.auth();

        function App() {
            const [user, setUser] = useState(null);
            const [isAdmin, setIsAdmin] = useState(false);
            const [studentName, setStudentName] = useState('');
            const [status, setStatus] = useState('');
            const [submissions, setSubmissions] = useState([]);
            
            const [order, setOrder] = useState(['', '', '', '', '', '', '']);
            const [rewriting, setRewriting] = useState({ q1: '', q2: '', q3: '', q6: '' });

            useEffect(() => {
                auth.signInAnonymously().then(cred => setUser(cred.user));
            }, []);

            useEffect(() => {
                if (!user || !isAdmin) return;
                const path = `artifacts/${appId}/public/data/responses_v3`;
                return db.collection(path).onSnapshot(snap => {
                    const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setSubmissions(data.sort((a, b) => b.serverTimestamp - a.serverTimestamp));
                });
            }, [user, isAdmin]);

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!studentName.trim()) return setStatus('Введите имя!');
                try {
                    setStatus('Отправка...');
                    await db.collection(`artifacts/${appId}/public/data/responses_v3`).add({
                        studentName, order, rewriting,
                        timestamp: new Date().toLocaleString(),
                        serverTimestamp: Date.now()
                    });
                    setStatus('Успешно отправлено!');
                    setStudentName('');
                } catch (e) { setStatus('Ошибка базы данных'); }
            };

            const reportSections = ["Executive Summary", "Introduction", "Evaluation Criteria", "Findings", "Analysis & Discussion", "Conclusion", "Recommendations"];

            return (
                <div className="min-h-screen p-4 md:p-12">
                    <div className="max-w-4xl mx-auto bg-white shadow-2xl rounded-[2rem] overflow-hidden border border-slate-200">
                        <header className="bg-slate-900 p-8 text-white flex justify-between items-center">
                            <div>
                                <h1 className="text-2xl font-bold text-blue-400">Engineering Reports Workshop</h1>
                                <p className="text-slate-400 text-sm italic">Vocabulary & Tone v3.0</p>
                            </div>
                            <button 
                                onClick={() => setIsAdmin(!isAdmin)}
                                className="text-[10px] uppercase tracking-widest border border-slate-700 px-4 py-2 rounded-full hover:bg-slate-800 transition-all"
                            >
                                {isAdmin ? 'Вернуться к листу' : 'Панель учителя'}
                            </button>
                        </header>

                        <div className="p-8 md:p-12">
                            {isAdmin ? (
                                <div className="space-y-6">
                                    <h2 className="text-xl font-bold text-slate-800 border-b pb-4">Ответы студентов ({submissions.length})</h2>
                                    {submissions.length === 0 ? <p className="text-slate-400 italic">Ответов пока нет...</p> : 
                                        submissions.map(s => (
                                            <div key={s.id} className="p-6 bg-slate-50 rounded-2xl border border-slate-100 shadow-sm">
                                                <div className="flex justify-between items-center mb-4">
                                                    <span className="font-bold text-blue-600 text-lg">{s.studentName}</span>
                                                    <span className="text-[10px] text-slate-400">{s.timestamp}</span>
                                                </div>
                                                <div className="text-xs space-y-2 text-slate-600">
                                                    <p><strong>Rewriting Q1:</strong> {s.rewriting.q1}</p>
                                                    <p><strong>Rewriting Q2:</strong> {s.rewriting.q2}</p>
                                                </div>
                                            </div>
                                        ))
                                    }
                                </div>
                            ) : (
                                <form onSubmit={handleSubmit} className="space-y-10">
                                    <section>
                                        <h3 className="font-bold text-lg mb-6 flex items-center gap-3">
                                            <span className="bg-blue-600 text-white w-6 h-6 rounded-full flex items-center justify-center text-xs">1</span>
                                            Logical Sequencing
                                        </h3>
                                        <div className="grid gap-3 max-w-md">
                                            {order.map((val, i) => (
                                                <select key={i} value={val} onChange={(e) => {
                                                    const n = [...order]; n[i] = e.target.value; setOrder(n);
                                                }} className="p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-400 outline-none">
                                                    <option value="">-- Шаг {i+1} --</option>
                                                    {reportSections.map(rs => <option key={rs} value={rs}>{rs}</option>)}
                                                </select>
                                            ))}
                                        </div>
                                    </section>

                                    <section className="space-y-8">
                                        <h3 className="font-bold text-lg flex items-center gap-3">
                                            <span className="bg-blue-600 text-white w-6 h-6 rounded-full flex items-center justify-center text-xs">2</span>
                                            Formal Rewriting
                                        </h3>
                                        {[
                                            { id: 'q1', label: 'PURPOSE', text: '"I\'m checking if the new filters are actually worth the money."', prompt: 'Start with: The aim of this report is to evaluate...' },
                                            { id: 'q2', label: 'FINDINGS', text: '"The system is better at cleaning water than the old one."', prompt: 'Use: Efficiency / Contaminant removal.' }
                                        ].map(item => (
                                            <div key={item.id} className="space-y-3">
                                                <div className="flex justify-between text-[10px] font-bold text-blue-500 uppercase">
                                                    <span>{item.label}</span>
                                                    <span className="text-slate-400 italic normal-case">{item.prompt}</span>
                                                </div>
                                                <p className="text-sm italic text-slate-600 pl-4 border-l-2 border-slate-200">{item.text}</p>
                                                <textarea 
                                                    className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl text-sm focus:ring-2 focus:ring-blue-400 outline-none transition-all"
                                                    rows="2" placeholder="Ваш вариант..."
                                                    value={rewriting[item.id]} onChange={(e) => setRewriting({...rewriting, [item.id]: e.target.value})}
                                                />
                                            </div>
                                        ))}
                                    </section>

                                    <div className="pt-8 border-t">
                                        <div className="bg-slate-900 p-6 rounded-3xl flex flex-col md:flex-row gap-4 items-center">
                                            <input 
                                                type="text" placeholder="Ваше Имя и Фамилия..." value={studentName}
                                                onChange={(e) => setStudentName(e.target.value)}
                                                className="w-full p-4 rounded-xl bg-white/10 text-white border-none focus:ring-2 focus:ring-blue-500 outline-none"
                                            />
                                            <button className="w-full md:w-auto bg-blue-600 hover:bg-blue-500 text-white px-10 py-4 rounded-xl font-bold transition-all active:scale-95">
                                                ОТПРАВИТЬ
                                            </button>
                                        </div>
                                        {status && <p className="text-center mt-4 font-bold text-blue-600 animate-pulse">{status}</p>}
                                    </div>
                                </form>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
