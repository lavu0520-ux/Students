<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рабочий лист: Инженерные отчеты</title>
    <!-- Подключаем стили и библиотеки через CDN (интернет) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Подключаем Firebase (база данных) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-900">
    <!-- Сюда React "отрисует" приложение -->
    <div id="root"></div>

    <!-- ТИП СКРИПТА ДОЛЖЕН БЫТЬ text/babel -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        // Автоматическое получение настроек из среды (если есть)
        const firebaseConfig = JSON.parse(window.__firebase_config || '{}');
        const appId = typeof window.__app_id !== 'undefined' ? window.__app_id : 'default-app-id';

        // Инициализация базы данных
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();
        const auth = firebase.auth();

        function App() {
            const [user, setUser] = useState(null);
            const [isAdmin, setIsAdmin] = useState(false);
            const [studentName, setStudentName] = useState('');
            const [status, setStatus] = useState('');
            const [submissions, setSubmissions] = useState([]);
            
            const [order, setOrder] = useState(['', '', '', '', '', '', '']);
            const [rewriting, setRewriting] = useState({ q1: '', q2: '', q3: '', q6: '' });

            // 1. Анонимный вход для отправки данных
            useEffect(() => {
                auth.signInAnonymously().then(cred => setUser(cred.user)).catch(e => console.error(e));
            }, []);

            // 2. Слушатель базы данных для учителя
            useEffect(() => {
                if (!user || !isAdmin) return;
                const path = `artifacts/${appId}/public/data/responses_v3`;
                
                const unsubscribe = db.collection(path).onSnapshot(snap => {
                    const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setSubmissions(data.sort((a, b) => b.serverTimestamp - a.serverTimestamp));
                }, (error) => {
                    console.error("Firestore Error:", error);
                });

                return () => unsubscribe();
            }, [user, isAdmin]);

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!studentName.trim()) return setStatus('Введите имя!');
                
                try {
                    setStatus('Отправка...');
                    const path = `artifacts/${appId}/public/data/responses_v3`;
                    await db.collection(path).add({
                        studentName, 
                        order, 
                        rewriting,
                        timestamp: new Date().toLocaleString(),
                        serverTimestamp: Date.now()
                    });
                    setStatus('Успешно отправлено!');
                    setStudentName('');
                    setOrder(['', '', '', '', '', '', '']);
                    setRewriting({ q1: '', q2: '', q3: '', q6: '' });
                } catch (e) { 
                    setStatus('Ошибка базы данных. Проверьте интернет.'); 
                }
            };

            const reportSections = ["Executive Summary", "Introduction", "Evaluation Criteria", "Findings", "Analysis & Discussion", "Conclusion", "Recommendations"];

            return (
                <div className="min-h-screen p-4 md:p-12">
                    <div className="max-w-4xl mx-auto bg-white shadow-2xl rounded-[2rem] overflow-hidden border border-slate-200">
                        <header className="bg-slate-900 p-8 text-white flex justify-between items-center border-b-4 border-blue-500">
                            <div>
                                <h1 className="text-2xl font-bold text-blue-400">Engineering Reports Workshop</h1>
                                <p className="text-slate-400 text-sm italic tracking-widest">VOCABULARY & TONE v3.5</p>
                            </div>
                            <button 
                                onClick={() => setIsAdmin(!isAdmin)}
                                className={`text-[10px] uppercase font-bold tracking-widest border px-6 py-2 rounded-full transition-all ${isAdmin ? 'bg-blue-600 border-blue-400' : 'bg-slate-800 border-slate-700 hover:bg-slate-700'}`}
                            >
                                {isAdmin ? 'Назад к форме' : 'Панель учителя'}
                            </button>
                        </header>

                        <div className="p-8 md:p-12">
                            {isAdmin ? (
                                <div className="space-y-6">
                                    <div className="flex justify-between items-center border-b pb-4">
                                        <h2 className="text-xl font-bold text-slate-800">Работы студентов</h2>
                                        <span className="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-xs font-bold">Сдано: {submissions.length}</span>
                                    </div>
                                    
                                    {submissions.length === 0 ? (
                                        <div className="text-center py-20 bg-slate-50 rounded-2xl border-2 border-dashed border-slate-200">
                                            <p className="text-slate-400 italic">Ответов пока нет. Сначала отправьте тест сами!</p>
                                        </div>
                                    ) : (
                                        <div className="space-y-6">
                                            {submissions.map(s => (
                                                <div key={s.id} className="p-6 bg-white border border-slate-200 rounded-2xl shadow-sm hover:border-blue-300 transition-all">
                                                    <div className="flex justify-between items-center mb-4">
                                                        <span className="font-bold text-blue-600 text-lg underline underline-offset-4">{s.studentName}</span>
                                                        <span className="text-[10px] text-slate-400 font-mono italic">{s.timestamp}</span>
                                                    </div>
                                                    <div className="grid md:grid-cols-2 gap-6 text-xs text-slate-600">
                                                        <div>
                                                            <p className="font-bold mb-2 uppercase text-slate-400">Structure:</p>
                                                            <ol className="list-decimal list-inside space-y-1">
                                                                {s.order.map((it, idx) => <li key={idx}>{it || '---'}</li>)}
                                                            </ol>
                                                        </div>
                                                        <div className="space-y-2">
                                                            <p className="font-bold mb-2 uppercase text-slate-400">Rewriting (Q1):</p>
                                                            <p className="bg-slate-50 p-3 rounded-lg border border-slate-100 italic leading-relaxed">
                                                                {s.rewriting.q1 || "Нет ответа"}
                                                            </p>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            ) : (
                                <form onSubmit={handleSubmit} className="space-y-12">
                                    <section>
                                        <h3 className="font-bold text-lg mb-6 flex items-center gap-3">
                                            <span className="bg-blue-600 text-white w-8 h-8 rounded-full flex items-center justify-center text-sm shadow-lg">1</span>
                                            Logical Sequencing
                                        </h3>
                                        <div className="grid gap-3 max-w-sm">
                                            {order.map((val, i) => (
                                                <select 
                                                    key={i} value={val} 
                                                    onChange={(e) => {
                                                        const n = [...order]; n[i] = e.target.value; setOrder(n);
                                                    }} 
                                                    className="p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-4 focus:ring-blue-50 transition-all outline-none"
                                                >
                                                    <option value="">-- Step {i+1} --</option>
                                                    {reportSections.map(rs => <option key={rs} value={rs}>{rs}</option>)}
                                                </select>
                                            ))}
                                        </div>
                                    </section>

                                    <section className="space-y-8">
                                        <h3 className="font-bold text-lg flex items-center gap-3">
                                            <span className="bg-blue-600 text-white w-8 h-8 rounded-full flex items-center justify-center text-sm shadow-lg">2</span>
                                            Formal Rewriting
                                        </h3>
                                        {[
                                            { id: 'q1', label: 'PURPOSE', text: '"I\'m checking if the new filters are actually worth the money."', prompt: 'The aim of this report is to evaluate...' },
                                            { id: 'q2', label: 'FINDINGS', text: '"The system is better at cleaning water than the old one."', prompt: 'Keywords: Efficiency / Contaminant removal.' }
                                        ].map(item => (
                                            <div key={item.id} className="space-y-3">
                                                <div className="flex justify-between text-[10px] font-black text-blue-500 tracking-wider uppercase">
                                                    <span>{item.label}</span>
                                                    <span className="text-slate-400 italic normal-case font-normal">{item.prompt}</span>
                                                </div>
                                                <p className="text-sm italic text-slate-700 pl-4 border-l-4 border-blue-100">{item.text}</p>
                                                <textarea 
                                                    className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl text-sm focus:ring-4 focus:ring-blue-50 outline-none transition-all shadow-inner"
                                                    rows="2" placeholder="Write formal version here..."
                                                    value={rewriting[item.id]} onChange={(e) => setRewriting({...rewriting, [item.id]: e.target.value})}
                                                />
                                            </div>
                                        ))}
                                    </section>

                                    <div className="pt-8 border-t border-slate-100">
                                        <div className="bg-slate-900 p-8 rounded-[2.5rem] flex flex-col md:flex-row gap-6 items-end shadow-xl relative overflow-hidden">
                                            <div className="flex-1 w-full">
                                                <label className="block text-xs font-bold text-slate-500 mb-3 uppercase tracking-widest">Full Name</label>
                                                <input 
                                                    type="text" placeholder="Введите ваше имя..." value={studentName}
                                                    onChange={(e) => setStudentName(e.target.value)}
                                                    className="w-full p-4 rounded-2xl bg-white/10 border border-white/20 text-white placeholder-slate-600 focus:ring-4 focus:ring-blue-500 outline-none transition-all"
                                                />
                                            </div>
                                            <button className="w-full md:w-auto bg-blue-600 hover:bg-blue-500 text-white px-10 py-4 rounded-2xl font-black text-sm transition-all active:scale-95 shadow-lg shadow-blue-500/20">
                                                SUBMIT WORK
                                            </button>
                                        </div>
                                        {status && <div className="text-center mt-6 p-4 bg-blue-50 text-blue-700 rounded-2xl font-bold text-sm border border-blue-100">{status}</div>}
                                    </div>
                                </form>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // Рендерим приложение в div#root
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
