<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engineering Reports Workshop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>
    <!-- React -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Данные конфигурации (автоматически подставляются средой или берутся пустые для демо)
        const firebaseConfig = JSON.parse(window.__firebase_config || '{}');
        const appId = typeof window.__app_id !== 'undefined' ? window.__app_id : 'default-app-id';

        // Инициализация Firebase (Compat mode для работы в одном файле)
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();

        function App() {
            const [user, setUser] = useState(null);
            const [studentName, setStudentName] = useState('');
            const [status, setStatus] = useState('');
            const [isAdmin, setIsAdmin] = useState(false);
            const [submissions, setSubmissions] = useState([]);
            const [order, setOrder] = useState(['', '', '', '', '', '', '']);
            const [rewriting, setRewriting] = useState({ q1: '', q2: '', q3: '', q6: '' });

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof window.__initial_auth_token !== 'undefined' && window.__initial_auth_token) {
                            await auth.signInWithCustomToken(window.__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (err) { console.error("Auth error:", err); }
                };
                initAuth();
                return auth.onAuthStateChanged(setUser);
            }, []);

            useEffect(() => {
                if (!user || !isAdmin) return;
                const path = `artifacts/${appId}/public/data/student_responses`;
                return db.collection(path).onSnapshot(snapshot => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setSubmissions(data.sort((a, b) => b.serverTimestamp - a.serverTimestamp));
                });
            }, [user, isAdmin]);

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!studentName.trim()) return setStatus('Введите имя.');
                try {
                    setStatus('Отправка...');
                    await db.collection(`artifacts/${appId}/public/data/student_responses`).add({
                        studentName, order, rewriting, 
                        timestamp: new Date().toLocaleString(),
                        serverTimestamp: Date.now()
                    });
                    setStatus('Успешно сохранено!');
                    setStudentName('');
                } catch (err) { setStatus('Ошибка отправки.'); }
            };

            const reportSections = ["Executive Summary", "Introduction", "Evaluation Criteria", "Findings", "Analysis & Discussion", "Conclusion", "Recommendations"];

            return (
                <div className="min-h-screen p-4 md:p-8 text-slate-900">
                    <div className="max-w-4xl mx-auto">
                        <header className="bg-slate-900 text-white p-6 rounded-t-3xl flex justify-between items-center shadow-xl">
                            <div>
                                <h1 className="text-xl font-bold text-blue-400">Engineering Reports Workshop</h1>
                                <p className="text-slate-400 text-xs italic">Vocabulary & Structure v2.0</p>
                            </div>
                            <button onClick={() => setIsAdmin(!isAdmin)} className="text-[10px] border border-slate-700 px-3 py-1 rounded-full hover:bg-slate-800 transition-all">
                                {isAdmin ? '🔒 Student Mode' : '🔓 Teacher Access'}
                            </button>
                        </header>

                        {isAdmin ? (
                            <div className="bg-white p-6 rounded-b-3xl shadow-xl border">
                                <h2 className="font-bold mb-4 border-b pb-2">Student Responses ({submissions.length})</h2>
                                <div className="space-y-4">
                                    {submissions.map(s => (
                                        <div key={s.id} className="border p-4 rounded-xl bg-slate-50">
                                            <div className="flex justify-between font-bold text-sm mb-2 text-blue-600">
                                                <span>{s.studentName}</span>
                                                <span className="text-slate-400 font-normal">{s.timestamp}</span>
                                            </div>
                                            <p className="text-xs italic text-slate-700 bg-white p-2 rounded border">"{s.rewriting.q1}"</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ) : (
                            <form onSubmit={handleSubmit} className="bg-white p-6 md:p-10 rounded-b-3xl shadow-xl border space-y-8">
                                <section>
                                    <h3 className="font-bold mb-4 text-slate-800">1. Logical Sequencing</h3>
                                    <div className="grid gap-2 max-w-xs">
                                        {order.map((val, i) => (
                                            <select key={i} value={val} onChange={(e) => {
                                                const n = [...order]; n[i] = e.target.value; setOrder(n);
                                            }} className="p-2 bg-slate-50 border rounded-lg text-xs">
                                                <option value="">-- Section {i+1} --</option>
                                                {reportSections.map(rs => <option key={rs} value={rs}>{rs}</option>)}
                                            </select>
                                        ))}
                                    </div>
                                </section>

                                <section className="space-y-6">
                                    <h3 className="font-bold text-slate-800">2. Formal Rewriting</h3>
                                    {[
                                        { id: 'q1', label: 'PURPOSE', text: '"I\'m checking if the new filters are actually worth the money."', prompt: 'Start: The aim of this report...' },
                                        { id: 'q2', label: 'FINDINGS', text: '"The system is better at cleaning water."', prompt: 'Use: Efficiency / Contaminant removal.' }
                                    ].map(item => (
                                        <div key={item.id} className="space-y-2">
                                            <div className="flex justify-between text-[10px] font-bold tracking-widest text-blue-500 uppercase">
                                                <span>{item.label}</span>
                                                <span className="text-slate-400 normal-case italic">{item.prompt}</span>
                                            </div>
                                            <p className="text-xs text-slate-600 border-l-2 border-blue-100 pl-3">{item.text}</p>
                                            <textarea 
                                                className="w-full p-3 bg-slate-50 border rounded-xl text-sm focus:ring-2 focus:ring-blue-100 outline-none"
                                                rows="2" value={rewriting[item.id]} onChange={(e) => setRewriting({...rewriting, [item.id]: e.target.value})}
                                            />
                                        </div>
                                    ))}
                                </section>

                                <div className="pt-6 border-t">
                                    <div className="bg-slate-900 p-6 rounded-2xl flex flex-col md:flex-row gap-4 items-center">
                                        <input 
                                            type="text" placeholder="Your Full Name..." value={studentName} 
                                            onChange={(e) => setStudentName(e.target.value)}
                                            className="w-full p-3 rounded-xl bg-white/10 text-white border-none outline-none focus:ring-2 focus:ring-blue-500"
                                        />
                                        <button className="w-full md:w-auto bg-blue-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-blue-500 transition-all">SUBMIT</button>
                                    </div>
                                    {status && <p className="text-center mt-3 text-xs font-bold text-blue-600">{status}</p>}
                                </div>
                            </form>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
